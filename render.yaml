# One-click deploy of the FastAPI backend on Render (https://render.com).
# In Render: New > Blueprint > point at this repo. Render reads this file.
services:
  - type: web
    name: delta-risk-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # A strong random JWT signing secret, generated by Render.
      - key: JWT_SECRET
        generateValue: true
      - key: DELTA_REST_URL
        value: https://api.india.delta.exchange
      - key: DELTA_WS_URL
        value: wss://socket.india.delta.exchange
      # SQLite on the free plan is ephemeral (resets on redeploy). For durable
      # storage, attach a Postgres instance and set DATABASE_URL to a
      # postgresql+asyncpg:// URL (and add asyncpg to requirements.txt).
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/delta_risk_manager.db
